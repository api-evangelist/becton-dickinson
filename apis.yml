name: Becton Dickinson
description: >-
  Becton Dickinson (BD) is a global medical technology company that develops, manufactures,
  and sells medical devices, instrument systems, and reagents. In October 2025, BD launched
  the BD Incada Connected Care Platform, an AI-enabled, cloud-based platform built on AWS
  that unifies data from nearly 3 million connected BD devices including infusion pumps,
  patient monitors, and pharmacy robotics. BD also produces the Pyxis medication management
  system and integrates with EMRs via HL7 FHIR standards for clinical data exchange.
