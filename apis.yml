apis:
  - aid: becton-dickinson:bd-incada-platform
    name: BD Incada Connected Care Platform
    description: >-
      The BD Incada Connected Care Platform is a scalable, AI-enabled, cloud-based
      platform launched in October 2025 that unifies BD device data from infusion pumps,
      patient monitors, and pharmacy robotics into one intelligent ecosystem. Built on
      AWS, it provides enterprise-wide medication inventory visibility, AI-powered natural
      language analytics, and integrates with major EMR systems via HL7 FHIR standards.
    humanURL: https://www.bd.com/en-us/
    tags:
      - Healthcare
      - Connected Devices
      - AI
      - Medication Management
      - EMR Integration
    properties:
      - type: Documentation
        url: https://www.bd.com/en-us/

  - aid: becton-dickinson:pyxis
    name: BD Pyxis Medication Management System
    description: >-
      BD Pyxis is a medication management and dispensing system used in hospitals to
      control medication access, reduce errors, and streamline pharmacy workflows. Pyxis
      connects to hospital information systems and EMRs for medication ordering, dispensing,
      and reconciliation workflows. The BD Incada platform extends Pyxis with cloud-based
      analytics and AI capabilities.
    humanURL: https://www.bd.com/en-us/products-and-solutions/products/product-families/pyxis
    tags:
      - Healthcare
      - Medication Management
      - Pharmacy
      - Hospital Automation
    properties:
      - type: Documentation
        url: https://www.bd.com/en-us/products-and-solutions/products/product-families/pyxis

