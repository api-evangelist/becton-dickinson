specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Becton Dickinson
providerId: becton-dickinson
publisherName: Becton, Dickinson and Company
serviceCategory: Healthcare / Medical Device Connectivity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - Medical Devices
  - Medication Management
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for BD Incada and BD Pyxis: hospital-services agreement billed
  per platform license + connected-device scope, with API access bundled. Public rate-card data is not
  available.'
notes: No public rate card. Replace meter values with the customer-negotiated BD agreement once available.
sources:
  - https://www.bd.com/en-us/
principles:
  - name: Visibility
    description: Use BD Incada's natural-language analytics and Pyxis reporting to attribute medication
      use, infusion volume, and inventory by hospital unit.
  - name: Allocation
    description: Allocate platform cost across nursing units (ICU, peri-op, oncology) and pharmacy by
      connected-device count and medication-event volume.
  - name: Optimization
    description: Right-size connected-device scope each renewal; consolidate Pyxis station footprint where
      utilization is low. Use AI inventory analytics to reduce stockouts and waste.
  - name: Accountability
    description: Joint biomed / pharmacy ownership of the BD engagement; review uptime, integration changes,
      and medication-safety metrics quarterly.
billingModel:
  pricingCategory: Hospital Services Agreement
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: BD Connected Care
  ServiceCategory: Healthcare / Medical Device Connectivity
  ProviderName: Becton Dickinson
  PublisherName: Becton, Dickinson and Company
  InvoiceIssuerName: Becton, Dickinson and Company
  PricingCategory: Hospital Services Agreement
  PricingUnit: device
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: connected_devices
    description: BD devices integrated through Incada / Pyxis
    unit: device
    aggregation: max
    dimensions:
      - device_class
      - hospital_unit
  - name: pyxis_stations
    description: BD Pyxis automated dispensing stations under management
    unit: station
    aggregation: max
    dimensions:
      - hospital_unit
  - name: medication_events
    description: Medication dispense / administration events tracked through Pyxis / Incada
    unit: event
    aggregation: sum
    dimensions:
      - hospital_unit
      - medication_class
  - name: ai_analytics_seats
    description: AI-analytics seats / use-case licenses
    unit: seat
    aggregation: sum
    dimensions:
      - module
      - hospital_unit
apis:
  - name: BD Incada Connected Care Platform
    baseURL: ''
    serviceName: BD Incada Connected Care Platform
    serviceCategory: API
  - name: BD Pyxis Medication Management System
    baseURL: ''
    serviceName: BD Pyxis Medication Management System
    serviceCategory: API
unitEconomics:
  - name: Cost per Connected Device
    metric: platform_cost / connected_devices
    target: align to per-device clinical / inventory savings
  - name: Cost per Pyxis Station
    metric: pyxis_cost / pyxis_stations
    target: align to medication-safety + waste-reduction targets
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
