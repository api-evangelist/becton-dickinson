specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Becton Dickinson
providerId: becton-dickinson
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - Medical Devices
  - Connected Health
  - Rate Limiting
description: BD does not publish public rate limits for the BD Incada or Pyxis connected-care APIs. Capacity
  is provisioned per hospital tenant on AWS-backed infrastructure and tuned to the connected-device fleet.
  No numeric values are asserted here.
notes: Reconcile with the BD Connected Care implementation runbook for the hospital tenant once available.
  Do not invent throughput numbers.
sources:
  - https://www.bd.com/en-us/
responseCodes:
  throttled: 429
limits:
  - name: Per-tenant ingestion rate
    scope: hospital-tenant
    metric: varies
    limit: 'sized to connected-device fleet; see BD Incada implementation runbook'
    notes: Telemetry from infusion pumps, monitors, and Pyxis stations is ingested per tenant; capacity
      is provisioned at deployment.
  - name: HL7 FHIR API throttle
    scope: integration
    metric: varies
    limit: 'see BD-EMR integration documentation'
    notes: FHIR endpoint capacity governed by EMR connector and BD-side configuration.
policies:
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on throttled responses; honor Retry-After when present.
  - name: Per-Hospital Provisioning
    description: Capacity tuned at deployment to device fleet and EMR throughput; not enforced via a public
      per-second number.
  - name: Clinical Safety Constraints
    description: Connected-device APIs operate inside a regulated clinical environment; integration changes
      and load profiles must follow the hospital's biomed/IT and pharmacy change-control process.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
